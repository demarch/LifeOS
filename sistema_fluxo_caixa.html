<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa - Sistema Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --bg-hover: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --radius: 12px;
        }

        .light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #f1f5f9;
            --bg-hover: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #cbd5e1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:hover {
            background: var(--bg-hover);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
        }

        /* Dashboard Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.success { border-left-color: var(--success); }
        .card.danger { border-left-color: var(--danger); }
        .card.warning { border-left-color: var(--warning); }

        .card-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .card-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Tabs */
        .tabs-container {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .tabs-header {
            display: flex;
            overflow-x: auto;
            background: var(--bg-card);
            padding: 0 10px;
            gap: 4px;
        }

        .tab-btn {
            padding: 16px 24px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-secondary);
        }

        .tab-content {
            display: none;
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            background: var(--bg-card);
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: var(--bg-hover);
        }

        tbody tr:focus-within {
            background: rgba(59, 130, 246, 0.1);
        }

        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .currency {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .positive { color: var(--success); font-weight: 600; }
        .negative { color: var(--danger); font-weight: 600; }
        .neutral { color: var(--warning); }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Month Summary */
        .month-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 8px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .tabs-header {
                padding: 0 5px;
            }

            .tab-btn {
                padding: 12px 16px;
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px 12px;
                font-size: 0.85rem;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }
    </style>
</head>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header fade-in">
            <h1><i class="fas fa-wallet"></i> Fluxo de Caixa</h1>
            <div class="header-actions">
                <button class="btn" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i> Tema
                </button>
                <button class="btn btn-primary" onclick="openAddMonthModal()">
                    <i class="fas fa-plus"></i> Novo Mês
                </button>
                <button class="btn btn-success" onclick="exportData()">
                    <i class="fas fa-download"></i> Exportar
                </button>
                <button class="btn" onclick="document.getElementById('importFile').click()">
                    <i class="fas fa-upload"></i> Importar
                </button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>

        <!-- Global Dashboard -->
        <div class="dashboard fade-in" id="globalDashboard">
            <div class="card success">
                <div class="card-label">Total Entradas</div>
                <div class="card-value" id="globalEntradas">R$ 0,00</div>
                <div class="card-sub">Todos os meses</div>
            </div>
            <div class="card danger">
                <div class="card-label">Total Saídas</div>
                <div class="card-value" id="globalSaidas">R$ 0,00</div>
                <div class="card-sub">Todos os meses</div>
            </div>
            <div class="card">
                <div class="card-label">Saldo Geral</div>
                <div class="card-value" id="globalSaldo">R$ 0,00</div>
                <div class="card-sub">Entradas - Saídas</div>
            </div>
            <div class="card warning">
                <div class="card-label">Média Mensal</div>
                <div class="card-value" id="globalMedia">R$ 0,00</div>
                <div class="card-sub">Performance média</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid fade-in">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-chart-line"></i> Evolução do Saldo</div>
                <div class="chart-container">
                    <canvas id="evolutionChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-chart-bar"></i> Entradas vs Saídas</div>
                <div class="chart-container">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-container fade-in">
            <div class="tabs-header" id="tabsHeader"></div>
            <div id="tabsContent"></div>
        </div>
    </div>

    <!-- Add Month Modal -->
    <div class="modal-overlay" id="addMonthModal">
        <div class="modal">
            <h2><i class="fas fa-calendar-plus"></i> Adicionar Novo Mês</h2>
            <div class="form-group">
                <label>Mês e Ano</label>
                <input type="month" id="newMonthInput">
            </div>
            <div class="form-group">
                <label>Saldo Inicial (opcional)</label>
                <input type="number" id="newMonthBalance" placeholder="0,00" step="0.01">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addMonthModal')">Cancelar</button>
                <button class="btn btn-primary" onclick="addMonth()">Adicionar</button>
            </div>
        </div>
    </div>

                type: 'bar',
                data: getComparisonData(),
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: getComputedStyle(document.body).getPropertyValue('--text-primary') } }
                    },
                    scales: {
                        x: { ticks: { color: getComputedStyle(document.body).getPropertyValue('--text-secondary') } },
                        y: { ticks: { color: getComputedStyle(document.body).getPropertyValue('--text-secondary') } }
                    }
                }
            });
        }

        function getEvolutionData() {
            const labels = [];
            const data = [];

            appData.months.forEach(month => {
                labels.push(month.name);
                const summary = calculateMonthSummary(month);
                data.push(summary.saldo);
            });

            return {
                labels,
                datasets: [{
                    label: 'Saldo Acumulado',
                    data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 6,
                    pointHoverRadius: 8
                }]
            };
        }

        function getComparisonData() {
            const labels = [];
            const entradas = [];
            const saidas = [];

            appData.months.forEach(month => {
                labels.push(month.name);
                const summary = calculateMonthSummary(month);
                entradas.push(summary.entradas);
                saidas.push(summary.saidas);
            });

            return {
                labels,
                datasets: [
                    {
                        label: 'Entradas',
                        data: entradas,
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    },
                    {
                        label: 'Saídas',
                        data: saidas,
                        backgroundColor: '#ef4444',
                        borderRadius: 6
                    }
                ]
            };
        }

        function updateCharts() {
            if (charts.evolution) {
                charts.evolution.data = getEvolutionData();
                charts.evolution.update();
            }
            if (charts.comparison) {
                charts.comparison.data = getComparisonData();
                charts.comparison.update();
            }
        }

        // Export/Import
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fluxo_caixa_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Dados exportados!', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.months) {
                        appData = data;
                        saveData();
                        renderTabs();
                        updateGlobalDashboard();
                        updateCharts();
                        showToast('Dados importados com sucesso!', 'success');
                    } else {
                        throw new Error('Formato inválido');
                    }
                } catch (err) {
                    showToast('Erro ao importar arquivo!', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // Theme
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            if (document.body.classList.contains('light-mode')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
            updateCharts();
        }

        // Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
    </script>
</body>
</html>
